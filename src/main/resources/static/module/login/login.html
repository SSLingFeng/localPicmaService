<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>登录 - LocalPicma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/public/res/module/login/login.css">
</head>
<body>
<div class="login-host">
    <div class="login-wrapper">

        <div class="login-header">
            <div class="brand">LocalPicma</div>
            <h1>
                登录账户
                <span>请输入您的凭据以继续</span>
            </h1>
        </div>

        <form class="login-form" id="loginForm" method="post" autocomplete="off">

            <div class="login-input-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="输入用户名或手机号"
                            autocomplete="username"
                    >
                </div>
            </div>

            <div class="login-input-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="输入密码"
                            autocomplete="current-password"
                    >
                    <button
                            type="button"
                            class="password-toggle"
                            id="passwordToggle"
                            aria-label="切换密码可见性"
                    >
                        <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <div class="checkbox-group">
                    <label class="custom-checkbox" for="rememberMe">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkmark">
                            <svg viewBox="0 0 12 12" fill="none" stroke="#08060a" stroke-width="2.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="2 6 5 9 10 3"/>
                            </svg>
                        </span>
                        <span class="check-label">记住密码</span>
                    </label>

                    <label class="custom-checkbox" for="autoLogin">
                        <input type="checkbox" id="autoLogin" name="autoLogin">
                        <span class="checkmark">
                            <svg viewBox="0 0 12 12" fill="none" stroke="#08060a" stroke-width="2.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="2 6 5 9 10 3"/>
                            </svg>
                        </span>
                        <span class="check-label">自动登录</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                登 录
            </button>
        </form>

        <div class="login-footer">
            <a href="#" id="forgotPassword">忘记密码</a>
            <span class="divider"></span>
            <a href="#" id="registerAccount">注册账户</a>
        </div>

        <div class="accent-line"></div>

    </div>
</div>
<script src="/public/res/module/auth.js"></script>
<script>

    (function () {

        var loginForm = document.getElementById('loginForm');
        var usernameInput = document.getElementById('username');
        var passwordInput = document.getElementById('password');
        var passwordToggle = document.getElementById('passwordToggle');
        var rememberMe = document.getElementById('rememberMe');
        var submitBtn = document.getElementById('submitBtn');

        // ★ 恢复按钮状态的函数
        function resetBtn() {
            submitBtn.disabled = false;
            submitBtn.textContent = '登 录';
        }

        passwordToggle.addEventListener('click', function () {
            var isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            passwordToggle.classList.toggle('active', isPassword);
        });

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            var username = usernameInput.value.trim();
            var password = passwordInput.value;

            if (!username) { alert('请输入用户名'); usernameInput.focus(); return; }
            if (!password) { alert('请输入密码'); passwordInput.focus(); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            fetch('/apilogin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: username, password: password })
            })
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (!data.token) {
                        // ★ 登录失败，直接抛出错误，进入 catch
                        throw new Error(data.error || '登录失败，请检查用户名和密码');
                    }

                    // 存储认证信息
                    Auth.setAuth(data.token, data.username);

                    if (rememberMe.checked) {
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        localStorage.removeItem('rememberMe');
                    }

                    // ★ 向后端确认 token 有效
                    return fetch('/apicheck-token', {
                        headers: { 'Authorization': 'Bearer ' + data.token }
                    });
                })
                .then(function (res) {
                    if (res && res.ok) {
                        // ★ 双重确认成功，跳转
                        window.location.href = Auth.getRedirectUrl();
                    } else {
                        throw new Error('登录异常，请重试');
                    }
                })
                .catch(function (err) {
                    // ★ 任何错误都恢复按钮
                    alert(err.message || '网络错误，请稍后重试');
                    resetBtn();
                });
        });
    })();
</script>
</body>
</html>
