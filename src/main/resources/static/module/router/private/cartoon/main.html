<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫画管理</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app" v-cloak>

  <!-- ====== 页头 ====== -->
  <header class="page-header">
    <h1 class="site-title"><i class="el-icon-notebook-2"></i> 漫画管理</h1>
    <p class="site-subtitle">共收录 <strong>{{ total }}</strong> 部作品</p>
  </header>

  <!-- ====== 搜索栏 ====== -->
  <section class="search-panel">
    <el-form :inline="true" :model="searchForm" class="search-form" @submit.native.prevent="doSearch">

      <el-form-item label="标题">
        <el-input v-model="searchForm.title"
                  placeholder="输入漫画标题..."
                  clearable prefix-icon="el-icon-search"
                  @keyup.enter.native="doSearch"
                  style="width:220px" />
      </el-form-item>

      <el-form-item label="类型">
        <el-select v-model="searchForm.type" placeholder="全部类型" clearable style="width:140px">
          <el-option v-for="o in typeOptions" :key="o.value" :label="o.label" :value="o.value" />
        </el-select>
      </el-form-item>

      <el-form-item label="标签">
        <el-select v-model="searchForm.tags"
                   multiple filterable remote reserve-keyword
                   placeholder="输入关键词搜索标签..."
                   :remote-method="onTagSearch"
                   :loading="tagLoading"
                   @visible-change="onTagDropVisible"
                   style="width:280px">
          <el-option v-for="t in tagOptions" :key="t" :label="t" :value="t" />
        </el-select>
      </el-form-item>

      <el-form-item label="类别">
        <el-select v-model="searchForm.categories"
                   multiple filterable remote reserve-keyword
                   placeholder="输入关键词搜索类别..."
                   :remote-method="onCatSearch"
                   :loading="catLoading"
                   @visible-change="onCatDropVisible"
                   style="width:280px">
          <el-option v-for="c in catOptions" :key="c" :label="c" :value="c" />
        </el-select>
      </el-form-item>

      <el-form-item>
        <el-button type="primary" icon="el-icon-search" @click="doSearch">搜索</el-button>
        <el-button icon="el-icon-refresh-left" @click="doReset">重置</el-button>
      </el-form-item>

    </el-form>
  </section>

  <!-- ====== 漫画列表 ====== -->
  <section class="comic-section" v-loading="loading" element-loading-text="加载中...">

    <transition-group name="card-anim" tag="div" class="comic-grid" v-if="comicList.length">
      <div v-for="(comic, idx) in comicList"
           :key="comic.id"
           class="comic-card"
           :style="{ animationDelay: idx * 0.035 + 's' }">

        <!-- 封面 -->
        <div class="comic-cover">
          <div class="cover-fallback">
            <i class="el-icon-picture-outline"></i>
            <span>{{ comic.title.charAt(0) }}</span>
          </div>
          <img v-if="getCoverUrl(comic)"
               :src="getCoverUrl(comic)"
               :alt="comic.title"
               loading="lazy"
               @error="$event.target.style.display='none'" />
          <div class="cover-badges">
            <span class="badge badge-type"
                  :class="comic.type === '漫画' ? 'type-comic' : 'type-coser'">
              {{ comic.type }}
            </span>
            <span class="badge badge-pages">
              <i class="el-icon-document"></i> {{ comic.pages_count }}P
            </span>
          </div>
        </div>

        <!-- 信息 -->
        <div class="comic-info">
          <h3 class="comic-title" :title="comic.title">{{ comic.title }}</h3>

          <div class="comic-meta">
            <span v-if="comic.author" class="meta-item">
              <i class="el-icon-user"></i>{{ comic.author }}
            </span>
            <span v-if="comic.chinese_team" class="meta-item">
              <i class="el-icon-s-custom"></i>{{ comic.chinese_team }}
            </span>
          </div>

          <div class="comic-tags" v-if="comic.tags && comic.tags.length">
            <el-tag v-for="tag in comic.tags.slice(0, 4)" :key="'t-'+tag"
                    size="mini" effect="dark" :type="tagColor(tag)">{{ tag }}</el-tag>
            <el-tag v-if="comic.tags.length > 4" size="mini" type="info" effect="dark">
              +{{ comic.tags.length - 4 }}
            </el-tag>
          </div>

          <div class="comic-cats" v-if="comic.categories && comic.categories.length">
            <el-tag v-for="cat in comic.categories.slice(0, 3)" :key="'c-'+cat"
                    size="mini" effect="plain" type="info">{{ cat }}</el-tag>
            <el-tag v-if="comic.categories.length > 3" size="mini" effect="plain" type="info">
              +{{ comic.categories.length - 3 }}
            </el-tag>
          </div>
        </div>

      </div>
    </transition-group>

    <el-empty v-if="!loading && !comicList.length" description="暂无作品数据" />
  </section>

  <!-- ====== 分页 ====== -->
  <footer class="pagination-bar" v-if="total > 0">
    <div class="pagination-inner">

      <el-tooltip content="首页" placement="top" :open-delay="500">
        <el-button class="pg-btn" icon="el-icon-d-arrow-left" size="small"
                   :disabled="currentPage<=1" @click="goPage(1)" />
      </el-tooltip>

      <el-tooltip content="上一页" placement="top" :open-delay="500">
        <el-button class="pg-btn" icon="el-icon-arrow-left" size="small"
                   :disabled="currentPage<=1" @click="goPage(currentPage-1)" />
      </el-tooltip>

      <div class="pg-jump">
        <el-input-number v-model="pageInput" :min="1" :max="totalPages"
                         size="small" controls-position="right"
                         @change="onPageJump" />
        <span class="pg-slash">/</span>
        <span class="pg-total">{{ totalPages }}</span>
      </div>

      <el-tooltip content="下一页" placement="top" :open-delay="500">
        <el-button class="pg-btn" icon="el-icon-arrow-right" size="small"
                   :disabled="currentPage>=totalPages" @click="goPage(currentPage+1)" />
      </el-tooltip>

      <el-tooltip content="最后一页" placement="top" :open-delay="500">
        <el-button class="pg-btn" icon="el-icon-d-arrow-right" size="small"
                   :disabled="currentPage>=totalPages" @click="goPage(totalPages)" />
      </el-tooltip>

    </div>
  </footer>

</div>

<script src="https://unpkg.com/vue@2.7.16/dist/vue.min.js"></script>
<script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
<script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
<script src="app.js"></script>
</body>
</html>
